<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>{{ title or "Exam System" }}</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}

.container{
    width:90%;
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* question box */

.qbox{
    border:1px solid #ccc;
    padding:15px;
    margin-bottom:25px;
    border-radius:8px;
    background:#fafafa;
}

/* diagrams */

.question-diagrams{
    margin:10px 0;
}

.embedded-diagram{
    width:500px;
    display:block;
    margin-bottom:10px;
}

.diagram-wrap{
position:relative;
display:inline-block;
width:600px;
}

.base-diagram{
display:block;
width:100%;
height:auto;
}
.diagram-wrap canvas{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
cursor:crosshair;
}
.student-overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:contain;
    pointer-events:none;
}
.question-diagrams img{
max-width:300px;
margin:5px;
}

/* forms */

input[type=number]{
    width:80px;
    padding:5px;
    font-size:16px;
}

textarea{
    width:100%;
    height:80px;
    margin-top:10px;
}

button{
    padding:8px 14px;
    font-size:16px;
    cursor:pointer;
}

</style>

</head>

<body>

{% include "components/navbar.html" %}

<div class="container">

{% block content %}
{% endblock %}

</div>

{% include "components/footer.html" %}

</body>
</html>

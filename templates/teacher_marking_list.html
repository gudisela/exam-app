<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Marking — {{ exam_id }}</title>
  <style>
    body{font-family:Arial;margin:18px}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #ddd;padding:8px;text-align:left}
    th{background:#f4f4f4}
    a.button{display:inline-block;padding:6px 10px;background:#1f6feb;color:#fff;border-radius:4px;text-decoration:none}
  </style>
</head>
<body>
  <h2>Marking — Exam: {{ exam_id }}</h2>

  {% if attempts %}
    <table>
      <tr>
        <th>Student</th>
        <th>Submitted</th>
        <th>Action</th>
      </tr>

      {% for s in attempts %}
      <tr>
        <td>{{ s.student_name }}</td>
        <td>{{ s.submitted }}</td>
        <td>
          
	<a class="button" href="/teacher/review/{{ s.id }}">Review</a>
	<a class="button" href="/teacher/mark/{{ s.id }}">Mark</a>
        </td>
      </tr>
      {% endfor %}

    </table>
  {% else %}
    <p>No attempts found for this exam.</p>
  {% endif %}
</body>
</html>
